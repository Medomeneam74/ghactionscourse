name: build,push and deploy
on: 
  push:
    branches: main 

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: checkout code
      uses: actions/checkout@v7
    - name: Dockerhub login in 
      run: echo "${{secrets.DOCKER_PASSWORD}}" | docker login -u "${{secrets.DOCKER_USERNAME}}" --password-stdin
    - name: buid-and-push
      run: |
          docker build -t ${{secrets.DOCKER_USERNAME}}/backend-app:latest .
          docker push ${{secrets.DOCKER_USERNAME}}/backend-app:latest
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps: 
      - name: deploy via ssh
        uses: invi5H/ssh-action@v1.0.0
        with:
          SSH_HOST: ${{secrets.SERVER_HOST}}
          SSH_USER: ${{secrets.SERVER_USERNAME}}
          SSH_KEY: ${{secrets.SERVER_PRIVATE_KEY}}
          script: |
            sudo docker pull ${{secrets.DOCKER_USERNAME}}/backend-app:latest
            sudo docker stop my-running-apps || true
            sudo docker rm my-running-apps || true
            sudo docker run -d --name my-running-app -p 80:3000 $${{secrets.DOCKER_USERNAME}}/backend-app:latest
        
