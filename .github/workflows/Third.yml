name: build,push and deploy
on: 
  push:
    branches: main 

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: checkout code
      uses: actions/checkout@v4
    - name: Dockerhub login in 
      run: echo "${{secrets.DOCKER_PASSWORD}}" | docker login -u "${{secrets.DOCKER_USERNAME}}" --password-stdin
    - name: buid-and-push
      run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/backend-app:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/backend-app:latest
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps: 
      - name: deploy via ssh
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_PRIVATE_KEY }}
          script: |
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/backend-app:latest
            sudo docker stop my-running-apps || true
            sudo docker rm my-running-apps || true
            sudo docker run -d --name my-running-apps -p 80:3000 ${{secrets.DOCKER_USERNAME}}/backend-app:latest
        
